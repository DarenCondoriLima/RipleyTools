    <main>
        <section>
            <h1>Perfil de usuario</h1>
            <p id="currentUserInfo">Cargando usuario...</p>
        </section>
    </main>

    <script src="../JS/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userInfoElement = document.getElementById('currentUserInfo');
            const loggedUser = localStorage.getItem('loggedUser');

            if (!loggedUser || typeof window.obtenerDatosUsuario !== 'function') {
                userInfoElement.textContent = 'No se pudo cargar la información del usuario.';
                return;
            }

            const userData = await window.obtenerDatosUsuario(parseInt(loggedUser, 10));

            if (!userData) {
                userInfoElement.textContent = 'No se encontraron datos para el usuario logueado.';
                return;
            }

            userInfoElement.innerHTML = `
                <p><strong>Código:</strong> ${userData.CodeR}</p>
                <p><strong>Nombre:</strong> ${userData.Name}</p>
                ${userData.UrlPassword ? `<p><strong>Foto/Enlace:</strong> <a href="${userData.UrlPassword}" target="_blank">Ver</a></p>` : ''}
            `;
        });
    </script>
</body>
