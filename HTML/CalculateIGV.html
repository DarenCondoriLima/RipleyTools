<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular IGV</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="igv-page">
    <nav>
        <ul>
            <li><a href="./calculateGoals.html">Calcular Metas</a></li>
            <!-- <li><a href="./generateCalendar.html">Generar Calendario</a></li> -->
            <!-- <li><a href="./callCustomers.html">Llamar CLientes</a></li> -->
            <!-- <li><a href="./equipmentReport.html">Reportes de equipos</a></li> -->
            <li><a href="./CalculateIGV.html">Calcular IGV</a></li>
            <li><a href="./perfil.html">Perfil</a></li>
            <li><a href="#" id="logoutButton">Logout</a></li>
        </ul>
    </nav>
    <main>
        <section class="igv-card">
            <h1>Calcular IGV</h1>
            <form id="igvForm">
                <label for="amount">Monto</label>
                <input type="number" id="amount" name="amount" placeholder="Ingrese el monto" required>
                <button type="submit">Calcular</button>
            </form>
            <div id="result" class="igv-result">
                <!-- Aquí se mostrará el resultado -->
            </div>
        </section>
    </main>
    <script>
        document.getElementById('igvForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const amountInput = document.getElementById('amount');
            const amount = parseFloat(amountInput.value);

            if (isNaN(amount) || amount <= 0) {
                alert('Por favor, ingrese un monto válido.');
                return;
            }

            const igv = amount * 0.18;
            const amountWithoutIGV = amount - igv;

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <p>Monto sin IGV: <strong>S/. ${amountWithoutIGV.toFixed(2)}</strong></p>
                <p>IGV calculado: <strong>S/. ${igv.toFixed(2)}</strong></p>
            `;
        });
    </script>
</body>
</html>
